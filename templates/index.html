<!DOCTYPE html>
<html>
<head>
<title>Credit Card Fraud Detection</title>
</head>
<body>

<h1>Credit Card Fraud Detection</h1>

<form action="/predict" method="POST">

{% for i in range(30) %}
<input type="number" step="any" name="f{{i}}" placeholder="Feature {{i}}" required>
<br><br>
{% endfor %}

<button type="submit">Predict</button>

</form>

{% if prediction %}
<h2>{{ prediction }}</h2>
{% endif %}

</body>
</html>
